<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js'></script>
    <style>
        body { margin: 40px; font-family: Arial; }
        #calendar { max-width: 1100px; margin: 0 auto; }
        .notification-btn {
            margin: 10px 0;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .notification-btn:hover { background-color: #45a049; }
        .stats-bar {
            margin: 10px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        .fc-event-title { color: blue !important; font-weight: bold; }
        .fc-col-header-cell-cushion { color: blue !important; }
        .fc-daygrid-day-number { color: blue !important; }
        .fc-toolbar-title { color: blue !important; }
        .notify-badge {
            background: #ff9800;
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 3px;
        }
        .favorite-badge {
            color: #ff9800;
            font-size: 12px;
            margin-left: 3px;
        }
        .fc .fc-daygrid-day-frame {
            background-color: #ffffff;
            border: 4px solid #f5f5f5 !important;
            border-radius: 4px;
        }
        .fc .fc-day-today {
            background-color: #ffeb3b !important;
        }
        .fc-event {
            border: none !important;
            border-radius: 12px !important;
            padding: 4px 8px !important;
            font-size: 0.9em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            background-color: #d4e6ff;
            color: #1a1a1a !important;
            max-width: 100% !important;
            overflow: hidden !important;
            white-space: nowrap !important;
            text-overflow: ellipsis !important;
        }
        .fc-event-title {
            font-weight: 500 !important;
            color: #1a1a1a !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            white-space: nowrap !important;
            display: block !important;
        }
        .fc-toolbar-title {
            font-size: 1.6em !important;
            font-weight: 500 !important;
            color: #333;
        }
        .fc-col-header-cell-cushion {
            font-weight: 500 !important;
            text-transform: lowercase;
            color: #666 !important;
        }
        .fc-button {
            background-color: #f0f0f0 !important;
            border: none !important;
            border-radius: 20px !important;
            color: #333 !important;
            padding: 6px 16px !important;
        }
        .view-switch-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
        }
        .view-switch-btn:hover { background: #e0e0e0; }
        .fc-daygrid-event-harness {
            max-width: 100% !important;
            overflow: hidden !important;
        }
    </style>
</head>
<body>
    <h1>Мероприятия ТюмГУ</h1>

    <div style="margin-bottom: 10px;">
        <a href="/list" style="background: #4CAF50; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px;">Список мероприятий</a>
    </div>

    <div class="stats-bar">
        Всего мероприятий: <span id="taskCounter">0</span>
        В избранном: <span id="favCounter">0</span>
        <button onclick="location.reload()" style="margin-left: 10px;">Обновить</button>
    </div>

    <button class="notification-btn" onclick="requestNotificationPermission()">
        Включить уведомления
    </button>

    <div style="margin-bottom: 20px; display: flex; gap: 8px;">
        <button class="view-switch-btn" data-view="dayGridMonth">Месяц</button>
        <button class="view-switch-btn" data-view="timeGridWeek">Неделя</button>
        <button class="view-switch-btn" data-view="timeGridDay">День</button>
        <button class="view-switch-btn" data-view="listWeek">Список</button>
    </div>

    <div id='calendar'></div>

    <script>
        var allEvents = [];

        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("Браузер не поддерживает уведомления");
                return;
            }
            if (Notification.permission === "granted") {
                alert("Уведомления уже включены");
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(function(permission) {
                    if (permission === "granted") alert("Уведомления включены");
                });
            }
        }

        function scheduleNotification(title, startTime) {
            if (Notification.permission !== "granted") return;
            var taskTime = new Date(startTime).getTime();
            var currentTime = new Date().getTime();
            var timeDiff = taskTime - currentTime;
            if (timeDiff > 0 && timeDiff < 86400000) {
                setTimeout(function() {
                    new Notification("Напоминание", {
                        body: title,
                        icon: "https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/favicon.ico",
                        requireInteraction: true
                    });
                }, timeDiff);
            }
        }

        function updateCounters() {
            document.getElementById('taskCounter').textContent = allEvents.length;
            var favCount = allEvents.filter(function(e) { return e.favorite == 1; }).length;
            document.getElementById('favCounter').textContent = favCount;
        }

        function refreshNotifications() {
            if (Notification.permission !== "granted") return;
            var favorites = allEvents.filter(function(e) { return e.favorite == 1; });
            favorites.forEach(function(event) {
                scheduleNotification(event.title, event.start);
            });
        }

        function fetchAllEvents(callback) {
            fetch('/api/events')
                .then(function(r) { return r.json(); })
                .then(function(events) {
                    allEvents = events;
                    updateCounters();
                    if (callback) callback();
                    refreshNotifications();
                });
        }

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
                },
                locale: 'ru',
                events: '/api/events',
                selectable: true,
                editable: false,
                dayMaxEvents: 3,

                select: function(info) {
                    var selectedDate = info.startStr.substring(0, 10);
                    fetch('/api/events')
                        .then(function(r) { return r.json(); })
                        .then(function(events) {
                            var dayEvents = events.filter(function(e) {
                                return e.start.substring(0, 10) === selectedDate;
                            });
                            if (dayEvents.length === 0) {
                                alert('На ' + selectedDate + ' мероприятий нет');
                                calendar.unselect();
                                return;
                            }
                            var message = 'Мероприятия на ' + selectedDate + ':\n\n';
                            dayEvents.forEach(function(event, index) {
                                var start = event.start.replace('T', ' ');
                                var end = event.end ? event.end.replace('T', ' ') : 'Не указано';
                                var location = event.location || 'Не указано';
                                message += (index + 1) + '. ' + event.title + '\n';
                                message += '   Начало: ' + start + '\n';
                                message += '   Окончание: ' + end + '\n';
                                message += '   Место: ' + location + '\n\n';
                            });
                            alert(message);
                        });
                    calendar.unselect();
                },

                eventClick: function(info) {
                    var location = info.event.extendedProps.location || 'Не указано';
                    var isFav = info.event.extendedProps.favorite ? 'Да' : 'Нет';
                    var start = info.event.startStr.replace('T', ' ');
                    var end = info.event.endStr ? info.event.endStr.replace('T', ' ') : 'Не указано';
                    var message = 'Название: ' + info.event.title + '\n';
                    message += 'Начало: ' + start + '\n';
                    message += 'Окончание: ' + end + '\n';
                    message += 'Место: ' + location + '\n';
                    message += 'В избранном: ' + isFav + '\n\n';
                    message += 'ОК - добавить/убрать из избранного\n';
                    message += 'Отмена - закрыть';
                    if (confirm(message)) {
                        var event = allEvents.find(function(e) {
                            return e.title === info.event.title && e.start === info.event.startStr;
                        });
                        var newFav = event && event.favorite ? 0 : 1;
                        fetch('/api/events/favorite', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                title: info.event.title,
                                start: info.event.startStr,
                                favorite: newFav
                            })
                        })
                        .then(function(r) { return r.json(); })
                        .then(function() {
                            if (event) event.favorite = newFav;
                            info.event.setExtendedProp('favorite', newFav);
                            updateCounters();
                            refreshNotifications();
                            calendar.refetchEvents();
                        });
                    }
                },

                eventContent: function(arg) {
                    var notifyBadge = arg.event.extendedProps.notify ? '<span class="notify-badge">🔔</span>' : '';
                    var favBadge = arg.event.extendedProps.favorite ? '<span class="favorite-badge">⭐</span>' : '';
                    return {
                        html: '<b>' + arg.event.title + '</b>' + notifyBadge + favBadge
                    };
                },

                eventsSet: function(events) {
                    events.forEach(function(event) {
                        var ev = event.toPlainObject();
                        var existing = allEvents.find(function(e) {
                            return e.title === ev.title && e.start === ev.startStr;
                        });
                        if (!existing) {
                            allEvents.push({
                                title: ev.title,
                                start: ev.startStr,
                                end: ev.endStr,
                                location: ev.extendedProps.location,
                                notify: ev.extendedProps.notify,
                                favorite: ev.extendedProps.favorite
                            });
                        } else {
                            existing.favorite = ev.extendedProps.favorite;
                            existing.notify = ev.extendedProps.notify;
                        }
                    });
                    updateCounters();
                }
            });

            calendar.render();
            fetchAllEvents();

            document.querySelectorAll('.view-switch-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var viewName = this.dataset.view;
                    calendar.changeView(viewName);
                    document.querySelectorAll('.view-switch-btn').forEach(function(b) {
                        b.style.background = '#f0f0f0';
                    });
                    this.style.background = '#d4e6ff';
                });
            });
        });
    </script>
</body>
</html>
